<script>
(function(){
  var burger = document.getElementById('burger-btn');
  var menu = document.getElementById('mobile-menu');
  var close = document.getElementById('mobile-close');
  function open(){ menu.removeAttribute('hidden'); burger.setAttribute('aria-expanded','true'); document.body.style.overflow='hidden'; }
  function shut(){ menu.setAttribute('hidden',''); burger.setAttribute('aria-expanded','false'); document.body.style.overflow=''; }
  if(burger) burger.addEventListener('click', function(e){ e.preventDefault(); menu.hasAttribute('hidden') ? open() : shut(); });
  if(close) close.addEventListener('click', shut);
  document.addEventListener('keydown', function(e){ if(e.key==='Escape') shut(); });
})();
</script>
